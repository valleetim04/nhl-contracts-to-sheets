name: Update NHL contracts in Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  update-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::nhlscraper
            any::httr2
            any::jsonlite
            any::dplyr
            any::arrow

      - name: Run R script
        env:
          GOOGLE_WEB_APP_URL: ${{ secrets.GOOGLE_WEB_APP_URL }}
          SHEETS_SECRET_KEY: ${{ secrets.SHEETS_SECRET_KEY }}
        run: Rscript update_contracts.R
